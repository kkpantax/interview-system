# 每日備份 Supabase Postgres（邏輯備份，pg_dump）。
#
# ── 啟用方式（一次性人工步驟）─────────────────────────────────────────────
# 1. Supabase Dashboard → Project Settings → Database → Connection string →
#    選「Session pooler」或「Direct connection」，複製那條 postgresql://... 字串
#    （記得把 [YOUR-PASSWORD] 換成真正的資料庫密碼）。
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name:  SUPABASE_DB_URL
#    Value: 上一步複製的完整連線字串
# 3. 存檔後即生效。可在 Actions 分頁點此 workflow → Run workflow 手動測試一次。
#
# 備份檔以 GitHub Actions artifact 保存 30 天，可在每次 run 的頁面下載（.dump，
# 用 `pg_restore` 還原）。要保存更久或異地，可改推到 private repo 或雲端儲存。
name: Daily DB Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 每日 UTC 18:00 = 台北時間 02:00
  workflow_dispatch: {}     # 允許在 Actions 分頁手動觸發

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::尚未設定 SUPABASE_DB_URL secret，見本檔頂部說明。"
            exit 1
          fi
          ts=$(date -u +%Y%m%d-%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --no-owner --no-privileges --format=custom \
            --file="db-backup-$ts.dump"
          ls -lh "db-backup-$ts.dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: db-backup-*.dump
          retention-days: 30
